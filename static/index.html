<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oakland Pickleball Court Availability</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <!-- Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1c1c1e;
      --white: #ffffff;
      --off-white: #f5f5f7;
      --orange: #e85d26;
      --orange-dark: #c44a1a;
      --blue: #2b5ea7;
      --blue-dark: #1e4480;
      --blue-light: #e8eef8;
      --muted: #4a4a4f;
      --rule: #dcdce0;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #162032;
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      -webkit-font-smoothing: antialiased;
    }

    .card {
      background: var(--white);
      border-top: 4px solid var(--orange);
      padding: 40px 44px;
      width: 100%;
      max-width: 520px;
    }

    .eyebrow {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      background: var(--blue-light);
      display: inline-block;
      padding: 0.35rem 0.85rem;
      margin-bottom: 1.25rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 0.6rem;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      line-height: 1.65;
      margin-bottom: 2rem;
    }

    label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    /* Flatpickr input styling */
    .flatpickr-input {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--rule);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.15s;
      background: var(--white);
      cursor: pointer;
    }

    .flatpickr-input:focus { border-color: var(--blue); }

    /* Flatpickr calendar overrides */
    .flatpickr-calendar {
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      border-radius: 0 !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18) !important;
      border: 1px solid var(--rule) !important;
    }

    .flatpickr-months .flatpickr-month {
      background: var(--blue) !important;
      color: #fff !important;
    }

    .flatpickr-current-month .flatpickr-monthDropdown-months,
    .flatpickr-current-month input.cur-year {
      color: #fff !important;
      font-family: 'Plus Jakarta Sans', sans-serif !important;
      font-weight: 700 !important;
    }

    .flatpickr-weekdays {
      background: var(--blue-light) !important;
    }

    span.flatpickr-weekday {
      background: var(--blue-light) !important;
      color: var(--blue) !important;
      font-weight: 700 !important;
      font-family: 'Plus Jakarta Sans', sans-serif !important;
    }

    .flatpickr-day.selected,
    .flatpickr-day.selected:hover {
      background: var(--orange) !important;
      border-color: var(--orange) !important;
    }

    .flatpickr-day:hover {
      background: var(--blue-light) !important;
      border-color: var(--blue-light) !important;
    }

    .flatpickr-day.today {
      border-color: var(--orange) !important;
    }

    .flatpickr-day.today:hover {
      background: var(--blue-light) !important;
    }

    .flatpickr-prev-month svg,
    .flatpickr-next-month svg {
      fill: #fff !important;
    }

    .flatpickr-prev-month:hover svg,
    .flatpickr-next-month:hover svg {
      fill: rgba(255,255,255,0.7) !important;
    }

    button {
      width: 100%;
      padding: 0.9rem 2rem;
      background: var(--orange);
      color: #fff;
      border: 2px solid var(--orange);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    button:hover:not(:disabled) {
      background: var(--orange-dark);
      border-color: var(--orange-dark);
    }

    button:disabled { background: #bbb; border-color: #bbb; cursor: not-allowed; }

    .progress-wrap {
      display: none;
      margin-top: 28px;
    }

    .progress-wrap.visible { display: block; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
    }

    .progress-pct {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--orange);
    }

    .progress-track {
      width: 100%;
      height: 6px;
      background: var(--rule);
    }

    .progress-bar {
      height: 6px;
      background: var(--orange);
      width: 0%;
      transition: width 0.4s ease;
    }

    .results { display: none; margin-top: 28px; }
    .results.visible { display: block; }

    .results-date {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .slot {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--blue-light);
      border: 1px solid #c5d8f0;
      border-left: 4px solid var(--blue);
      margin-bottom: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--ink);
    }

    .no-slots {
      padding: 16px;
      background: var(--off-white);
      border: 1px solid var(--rule);
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
    }

    .error {
      display: none;
      margin-top: 20px;
      padding: 14px 16px;
      background: #fff3f0;
      border: 1px solid #f5c6b0;
      border-left: 4px solid var(--orange);
      color: var(--orange-dark);
      font-size: 0.88rem;
      font-weight: 500;
    }

    .error.visible { display: block; }

    .court-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--rule);
      text-align: center;
    }

    @media (max-width: 560px) {
      .card { padding: 28px 20px; }
    }
    @media (max-width: 400px) {
      body { padding: 20px 8px; }
      .card { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="eyebrow">Live Demo &middot; AI Automation</div>
    <h1>Pickleball Court Availability</h1>
    <p class="subtitle">
      Pick a date and see what's open at Bushrod Tennis Court in Oakland.
      This tool scrapes the city's reservation portal in real time.
    </p>

    <label for="date">Select a date</label>
    <input type="text" id="date" placeholder="Select a date..." readonly="readonly" />

    <button id="check-btn" onclick="checkAvailability()">Check Availability</button>

    <div class="progress-wrap" id="progress-wrap">
      <div class="progress-label">
        <span id="progress-msg">Connecting to reservation portal...</span>
        <span class="progress-pct" id="progress-pct">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div class="error" id="error"></div>

    <div class="results" id="results">
      <div class="results-date" id="results-date"></div>
      <div id="slots-list"></div>
    </div>

    <p class="court-label">Bushrod Tennis Court #1 &mdash; Oakland, CA</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script>
    // Init Flatpickr
    const tomorrow = new Date();
    tomorrow.setDate(tomorrow.getDate() + 1);

    const picker = flatpickr("#date", {
      minDate: "today",
      defaultDate: tomorrow,
      disableMobile: true,
      dateFormat: "M j, Y",
    });

    function getSelectedDate() {
      const d = picker.selectedDates[0];
      if (!d) return null;
      const y = d.getFullYear();
      const mo = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${mo}-${day}`;
    }

    function fmt12(time24) {
      const [h, m] = time24.split(":").map(Number);
      const period = h >= 12 ? "PM" : "AM";
      const hour = h % 12 || 12;
      return `${hour}:${String(m).padStart(2, "0")} ${period}`;
    }

    function formatDate(dateStr) {
      const [y, mo, d] = dateStr.split("-").map(Number);
      const dt = new Date(y, mo - 1, d);
      return dt.toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });
    }

    let _progressTimer = null;

    function startProgress() {
      const bar = document.getElementById("progress-bar");
      const pct = document.getElementById("progress-pct");
      const msg = document.getElementById("progress-msg");
      const steps = [
        { at: 0,  pct: 0,  label: "Connecting to reservation portal..." },
        { at: 1,  pct: 20, label: "Loading court calendar..." },
        { at: 3,  pct: 50, label: "Jumping to selected date..." },
        { at: 5,  pct: 75, label: "Reading available slots..." },
        { at: 8,  pct: 90, label: "Almost done..." },
        { at: 15, pct: 95, label: "Server is busy, hang tight..." },
      ];
      const start = Date.now();
      _progressTimer = setInterval(() => {
        const elapsed = (Date.now() - start) / 1000;
        let current = steps[0];
        for (const s of steps) { if (elapsed >= s.at) current = s; }
        bar.style.width = current.pct + "%";
        pct.textContent = current.pct + "%";
        msg.textContent = current.label;
      }, 300);
    }

    function stopProgress(success) {
      clearInterval(_progressTimer);
      const bar = document.getElementById("progress-bar");
      const pct = document.getElementById("progress-pct");
      const msg = document.getElementById("progress-msg");
      bar.style.width = "100%";
      pct.textContent = "100%";
      msg.textContent = success ? "Done!" : "Failed.";
    }

    async function checkAvailability() {
      const dateVal = getSelectedDate();
      if (!dateVal) return;

      const btn = document.getElementById("check-btn");
      const progressWrap = document.getElementById("progress-wrap");
      const results = document.getElementById("results");
      const error = document.getElementById("error");

      btn.disabled = true;
      progressWrap.classList.add("visible");
      results.classList.remove("visible");
      error.classList.remove("visible");
      startProgress();

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 90000);

      try {
        const res = await fetch("/availability", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ date: dateVal }),
          signal: controller.signal,
        });
        clearTimeout(timeoutId);

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.detail || "Something went wrong.");
        }

        const day = data.days && data.days[0];
        const slots = day ? day.available_slots : [];

        document.getElementById("results-date").textContent = formatDate(dateVal);

        const list = document.getElementById("slots-list");
        list.innerHTML = "";

        if (slots.length === 0) {
          list.innerHTML = '<div class="no-slots">No available slots found for this date.</div>';
        } else {
          slots.forEach(slot => {
            const div = document.createElement("div");
            div.className = "slot";
            div.innerHTML = `<span>${fmt12(slot.start)} &ndash; ${fmt12(slot.end)}</span>`;
            list.appendChild(div);
          });
        }

        stopProgress(true);
        results.classList.add("visible");
      } catch (err) {
        clearTimeout(timeoutId);
        stopProgress(false);
        if (err.name === "AbortError") {
          error.textContent = "Server is busy right now. Please try again in a moment.";
        } else {
          error.textContent = err.message || "Unable to check availability. Please try again.";
        }
        error.classList.add("visible");
      } finally {
        btn.disabled = false;
        setTimeout(() => progressWrap.classList.remove("visible"), 800);
      }
    }
  </script>
</body>
</html>
